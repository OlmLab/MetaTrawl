<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 900" role="img" aria-labelledby="title desc">
  <title id="title">MetaTrawl genomic collection concept</title>
  <desc id="desc">Circular bacterial chromosomes drift through an ocean, are gathered by a trawl-like mesh, and resolve into a phylogenetic tree.</desc>
  <defs>
    <radialGradient id="paper" cx="50%" cy="45%" r="75%">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#f8f4e9"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <g id="chromosome">
      <circle r="22" fill="none" stroke="#80aca2" stroke-width="4"/>
      <path d="M-15.7-15.4A22 22 0 0 1-4.5-21.5" fill="none" stroke="#005b6b" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M15.9-15.1A22 22 0 0 1 21-6.3" fill="none" stroke="#e7653e" stroke-width="4.5" stroke-linecap="round"/>
    </g>
    <g id="chromosome-faint">
      <circle r="18" fill="none" stroke="#9fc1b8" stroke-width="3"/>
      <path d="M-12.7-12.7A18 18 0 0 1-3.8-17.6" fill="none" stroke="#4c9696" stroke-width="3.5" stroke-linecap="round"/>
    </g>
    <g id="chromosome-leaf">
      <circle r="21" fill="#fffdf7" stroke="#80aca2" stroke-width="4"/>
      <path d="M-14.8-14.7A21 21 0 0 1-4-20.6" fill="none" stroke="#005b6b" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M15-14.6A21 21 0 0 1 20.2-5.8" fill="none" stroke="#e7653e" stroke-width="4.5" stroke-linecap="round"/>
    </g>
    <clipPath id="netArea">
      <path d="M462 70C645 250 1010 310 1325 382C1220 488 1195 687 1014 769C824 855 603 792 478 720C747 820 972 763 1104 637C1190 554 1232 450 1325 382C1030 411 783 430 653 555C568 637 604 717 478 720C590 647 496 506 517 383C535 278 491 169 462 70Z"/>
    </clipPath>
  </defs>

  <rect width="1800" height="900" fill="url(#paper)"/>
  <ellipse cx="650" cy="470" rx="660" ry="340" fill="#8ab8ae" opacity=".035" filter="url(#softGlow)"/>

  <!-- Ocean of circular chromosomes -->
  <g opacity=".95">
    <use href="#chromosome" transform="translate(126 97) scale(.82) rotate(-15)"/>
    <use href="#chromosome-faint" transform="translate(227 95) scale(.62)"/>
