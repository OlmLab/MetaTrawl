{% set name = "metatrawl" %}
{% set version = "0.1.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  # Hash of the locally built dist/metatrawl-0.1.4.tar.gz. Valid only if you
  # publish *that* artifact (`poetry publish`, no rebuild). If you rebuild
  # before uploading, re-run: shasum -a 256 dist/metatrawl-0.1.4.tar.gz
  sha256: 883cc9af585f2f152a03a730a4231dca70201e542090fc00fac3d7ddbc90dac6

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - metatrawl = metatrawl.cli:cli

requirements:
  host:
    - python >=3.12
    - pip
    - poetry-core >=2.0
  run:
    - python >=3.12
    # --- Python libraries (declared in pyproject) ---
    - click >=8.1
    - duckdb >=1.1
    - polars >=1.0
    - rich >=13.0
    # --- Sibling profiler: provides the `zipstrain` executable that MetaTrawl
    #     shells out to. Not a pip dependency, so conda must supply it.
    #     Transitively pulls pytorch + h5py for matrix building. ---
    - zipstrain >=0.10.2
    # --- External bioinformatics executables (the part pip cannot install).
    #     Names verified against the health check in
    #     src/metatrawl/healthcheck.py REQUIRED_EXECUTABLES. ---
    - sylph                # `sylph`
    - samtools             # `samtools`
    - bowtie2              # `bowtie2`, `bowtie2-build`
    - prodigal             # `prodigal`
    - sra-tools            # `prefetch`, `fasterq-dump`
    - ncbi-datasets-cli    # `datasets`

test:
  imports:
    - metatrawl
  commands:
    - metatrawl --help
    # Every executable the health check requires must resolve on PATH.
    - zipstrain --help
    - sylph --version
    - samtools --version
    - bowtie2 --version
    - prefetch --version
    - fasterq-dump --version
    - datasets --version
    - command -v prodigal

about:
  home: https://github.com/parsaghadermarzi/MetaTrawl
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Mutable registry and workflow bookkeeping for large ZipStrain/SRA profiling projects."
  dev_url: https://github.com/parsaghadermarzi/MetaTrawl

extra:
  recipe-maintainers:
    - parsaghadermarzi
